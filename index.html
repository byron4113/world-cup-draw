<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Cup 2026 — Family Draw</title>
  <meta name="description" content="Who's winning the family World Cup draw?" />
  <link rel="stylesheet" href="style.css?v=14" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>" />
</head>
<body>
  <header class="site-head">
    <div class="kicker">⚽ World Cup 2026 · Family Draw</div>
    <h1>Who's winning the draw?</h1>
    <p id="banner" class="banner" style="display:none"></p>
  </header>

  <main>
    <section class="block">
      <div id="stagebar"></div>
    </section>

    <section class="block">
      <h2 class="block-title">🏁 Who's ahead</h2>
      <div id="leaderboard" class="leaderboard"></div>
    </section>

    <section class="block">
      <h2 class="block-title">👥 The teams</h2>
      <div id="rosters" class="rosters"></div>
    </section>

    <section class="block">
      <h2 class="block-title">📅 Matches</h2>
      <div id="fixtures" class="fixtures"></div>
    </section>
  </main>

  <footer class="site-foot">
    <div id="remaining"></div>
    <span id="updated"></span>
  </footer>

  <script src="app.js?v=14"></script>
</body>
</html>
