name: Update World Cup data

on:
  schedule:
    # Hourly at :23 (off the busy top-of-hour). GitHub silently drops/delays many
    # scheduled runs on free repos, so we over-schedule to land enough each day.
    - cron: "23 * * * *"
  workflow_dispatch: {} # adds a "Run workflow" button you can press any time

# Let the action commit the refreshed data.json back to the repo.
permissions:
  contents: write

# Never let two of these run at once (avoids push collisions).
concurrency:
  group: update-world-cup-data
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch latest results
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: node update.mjs

      - name: Commit if data changed
        run: |
          git config user.name "wc-bot"
          git config user.email "actions@github.com"
          if git diff --quiet data.json; then
            echo "No changes."
            exit 0
          fi
          git add data.json
          git commit -m "Update World Cup data ($(date -u +%Y-%m-%dT%H:%MZ))"
          # Be resilient if the branch moved (overlapping runs, history rewrite, etc.):
          # rebase onto the latest main, preferring our freshly-generated data.json, then retry.
          for attempt in 1 2 3; do
            if git push; then
              echo "Pushed."
              exit 0
            fi
            echo "Push rejected — syncing with remote (attempt $attempt)…"
            git pull --rebase -X theirs origin main || true
          done
          echo "Push still failing after retries."
          exit 1
